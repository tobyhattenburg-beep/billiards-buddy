name: Android build

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/**"
      - master
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: Build release bundle and APK (unsigned)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Collect outputs
        run: |
          mkdir -p dist
          cp android/app/build/outputs/bundle/release/app-release.aab dist/app-release-unsigned.aab
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk dist/app-release-unsigned.apk
          sha256sum dist/app-release-unsigned.aab dist/app-release-unsigned.apk > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: billiards-buddy-unsigned
          path: dist/

      - name: Commit outputs back to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "No changes in dist/"
          else
            git commit -m "ci: unsigned release AAB/APK from ${GITHUB_SHA::7} [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
